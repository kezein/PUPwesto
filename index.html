<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabDesk · CCIS Lab Reservations v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#7a0e1e;--maroon-deep:#5c0a16;--maroon-soft:#9c2433;
    --gold:#e6b54a;--gold-soft:#f2d68a;
    --ink:#1c1419;--paper:#f7f2ec;--card:#fffdfa;--line:#e7ddd2;--muted:#8a7d72;
    --green:#2f8f6b;--green-bg:#e3f3ec;--amber:#c98a1e;--amber-bg:#fbeed2;
    --red:#c0392b;--red-bg:#f9e3e0;--blue:#345b8c;--blue-bg:#e4ecf6;
    --purple:#6b4a8c;--purple-bg:#ece4f4;
    --shadow:0 10px 40px -12px rgba(92,10,22,.28);--shadow-sm:0 4px 18px -8px rgba(28,20,25,.25);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Outfit',sans-serif;
    background:radial-gradient(900px 500px at 85% -5%,rgba(230,181,74,.16),transparent 60%),radial-gradient(900px 600px at -10% 10%,rgba(122,14,30,.12),transparent 55%),var(--paper);
    color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased;padding:34px 18px 70px}
  .wrap{max-width:1180px;margin:0 auto}
  .top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:18px;margin-bottom:26px}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{width:54px;height:54px;border-radius:16px;background:linear-gradient(150deg,var(--maroon),var(--maroon-deep));display:grid;place-items:center;color:var(--gold-soft);font-family:'Fraunces',serif;font-weight:700;font-size:26px;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .logo::after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent 40%,rgba(255,255,255,.22) 50%,transparent 60%)}
  .brand h1{font-family:'Fraunces',serif;font-size:27px;font-weight:700;letter-spacing:-.01em}
  .brand p{font-size:12.5px;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;font-weight:600}
  .tag{font-size:11px;color:var(--maroon);background:#fff;border:1px solid var(--line);padding:7px 13px;border-radius:30px;font-weight:600;display:flex;align-items:center;gap:7px}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px var(--green-bg)}

  .roles{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;background:#fff;padding:7px;border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow-sm);width:fit-content;max-width:100%}
  .role{border:none;background:transparent;cursor:pointer;font-family:inherit;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:9px;transition:.22s;white-space:nowrap}
  .role .ri{width:24px;height:24px;border-radius:8px;background:var(--paper);display:grid;place-items:center;font-size:13px;transition:.22s}
  .role:hover{color:var(--ink)}
  .role.active{background:linear-gradient(150deg,var(--maroon),var(--maroon-deep));color:#fff;box-shadow:var(--shadow)}
  .role.active .ri{background:rgba(255,255,255,.18);color:var(--gold-soft)}

  .screentabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:26px}
  .stab{border:1px solid var(--line);background:#fff;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;color:var(--muted);padding:7px 13px;border-radius:20px;transition:.18s}
  .stab:hover{border-color:var(--maroon-soft);color:var(--maroon)}
  .stab.on{background:var(--ink);color:#fff;border-color:var(--ink)}

  .stage{display:grid;grid-template-columns:340px 1fr;gap:34px;align-items:start}
  @media(max-width:880px){.stage{grid-template-columns:1fr}}
  .phone{background:#120a0e;border-radius:42px;padding:12px;box-shadow:0 30px 70px -25px rgba(92,10,22,.6);position:sticky;top:30px;justify-self:center}
  .screen{width:312px;height:632px;background:var(--paper);border-radius:32px;overflow:hidden;position:relative;display:flex;flex-direction:column}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:120px;height:26px;background:#120a0e;border-radius:0 0 16px 16px;z-index:30}

  .appbar{background:linear-gradient(160deg,var(--maroon),var(--maroon-deep));color:#fff;padding:38px 20px 18px;position:relative}
  .appbar .hi{font-size:12.5px;opacity:.8;font-weight:500}
  .appbar .nm{font-family:'Fraunces',serif;font-size:20px;font-weight:600;margin-top:2px;display:flex;align-items:center;justify-content:space-between}
  .av{width:34px;height:34px;border-radius:11px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:14px;color:var(--gold-soft);font-weight:700}
  .rbadge{display:inline-block;margin-top:9px;font-size:10.5px;background:rgba(230,181,74,.2);color:var(--gold-soft);padding:4px 11px;border-radius:20px;font-weight:600;letter-spacing:.03em}
  .appbar.compact{padding:38px 20px 16px}
  .backrow{display:flex;align-items:center;gap:10px;color:#fff}
  .backrow .bk{width:30px;height:30px;border-radius:10px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:15px;cursor:pointer}
  .backrow .ti{font-family:'Fraunces',serif;font-size:18px;font-weight:600}
  .backrow .sub{font-size:11px;opacity:.8}

  .body{flex:1;overflow-y:auto;padding:16px 16px 80px}
  .body::-webkit-scrollbar{width:0}
  .sec-h{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:18px 2px 10px;display:flex;justify-content:space-between;align-items:center}
  .sec-h:first-child{margin-top:2px}
  .sec-h a{color:var(--maroon);font-size:11px;font-weight:600;text-transform:none;letter-spacing:0;cursor:pointer}
  .card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;box-shadow:var(--shadow-sm)}
  .card+.card{margin-top:11px}

  .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:13px 14px}
  .stat .n{font-family:'Fraunces',serif;font-size:26px;font-weight:700;line-height:1}
  .stat .l{font-size:11px;color:var(--muted);margin-top:4px;font-weight:500}
  .stat.g .n{color:var(--green)}.stat.a .n{color:var(--amber)}.stat.r .n{color:var(--red)}.stat.b .n{color:var(--blue)}

  .room{display:flex;align-items:center;gap:13px;padding:13px;border:1px solid var(--line);border-radius:16px;background:var(--card);margin-bottom:10px;position:relative;cursor:pointer}
  .room .rno{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;flex-shrink:0}
  .rno.free{background:var(--green-bg);color:var(--green)}.rno.occ{background:var(--red-bg);color:var(--red)}.rno.pend{background:var(--amber-bg);color:var(--amber)}
  .room .rm{flex:1;min-width:0}
  .room .rm b{font-size:14px;font-weight:600;display:block}
  .room .rm span{font-size:11.5px;color:var(--muted)}
  .pill{font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;letter-spacing:.03em}
  .pill.free{background:var(--green-bg);color:var(--green)}.pill.occ{background:var(--red-bg);color:var(--red)}.pill.pend{background:var(--amber-bg);color:var(--amber)}
  .comp{font-size:11px;color:var(--green);font-weight:600;margin-top:3px;display:flex;align-items:center;gap:5px}
  .comp .ci{width:6px;height:6px;border-radius:50%;background:var(--green)}
  /* hover tooltip on occupied rooms */
  .room .tip{position:absolute;left:50%;bottom:calc(100% + 6px);transform:translateX(-50%) translateY(4px);background:var(--ink);color:#fff;padding:9px 12px;border-radius:10px;font-size:11px;line-height:1.5;width:200px;opacity:0;pointer-events:none;transition:.18s;z-index:20;box-shadow:var(--shadow)}
  .room .tip b{color:var(--gold-soft)}
  .room .tip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--ink)}
  .room:hover .tip{opacity:1;transform:translateX(-50%) translateY(0)}

  .req{padding:14px;border:1px solid var(--line);border-radius:16px;background:var(--card);margin-bottom:11px}
  .req .rh{display:flex;justify-content:space-between;align-items:start;margin-bottom:9px}
  .req .rh b{font-size:14px;font-weight:600}
  .req .rh span{font-size:11px;color:var(--muted)}
  .req .meta{font-size:12px;color:var(--muted);line-height:1.7}
  .req .meta b{color:var(--ink);font-weight:600}
  .stamp{font-size:10.5px;color:var(--blue);background:var(--blue-bg);display:inline-flex;gap:5px;align-items:center;padding:4px 9px;border-radius:8px;font-weight:600;margin-top:8px}
  .acts{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;border:none;font-family:inherit;font-weight:600;font-size:12.5px;padding:10px;border-radius:11px;cursor:pointer;transition:.18s}
  .btn.ok{background:var(--green);color:#fff}.btn.ok:hover{background:#267a59}
  .btn.no{background:#fff;color:var(--red);border:1px solid var(--red-bg)}.btn.no:hover{background:var(--red-bg)}
  .btn.full{background:linear-gradient(150deg,var(--maroon),var(--maroon-deep));color:#fff;flex:none;width:100%;padding:13px}.btn.full:hover{filter:brightness(1.08)}
  .btn.ghost{background:#fff;color:var(--maroon);border:1px solid var(--line);flex:none;width:100%;padding:12px}

  /* FORM (mirrors paper form) */
  .formnote{font-size:11px;color:var(--amber);background:var(--amber-bg);border-radius:10px;padding:9px 11px;line-height:1.5;margin-bottom:14px;font-weight:500}
  .fl{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:14px 2px 6px}
  .fi,.fs{width:100%;font-family:inherit;font-size:13px;border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:#fff;color:var(--ink)}
  .fi:focus,.fs:focus{outline:none;border-color:var(--maroon-soft)}
  .frow{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:2px}
  .chip{font-size:11.5px;border:1px solid var(--line);background:#fff;border-radius:20px;padding:7px 12px;cursor:pointer;transition:.15s;font-weight:500;color:var(--muted)}
  .chip.on{background:var(--maroon);color:#fff;border-color:var(--maroon)}
  .chip:hover{border-color:var(--maroon-soft)}

  /* SEAT MAP / floor plan */
  .floor{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;position:relative}
  .floorwrap{position:relative;background:repeating-linear-gradient(0deg,#fbf7f1,#fbf7f1 22px,#f4ece1 22px,#f4ece1 23px);border:2px solid var(--ink);border-radius:10px;padding:30px 14px 16px}
  .board{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--gold-soft);text-align:center;font-size:9px;letter-spacing:.18em;padding:5px 22px;border-radius:6px;font-weight:600}
  .door{position:absolute;font-size:8.5px;font-weight:700;color:var(--green);background:var(--green-bg);padding:3px 7px;border-radius:5px;letter-spacing:.04em;border:1px dashed var(--green)}
  .door.exit{color:var(--red);background:var(--red-bg);border-color:var(--red)}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;margin-top:6px}
  .seat{aspect-ratio:1;border-radius:8px;display:grid;place-items:center;font-size:9px;font-weight:600;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:.15s;border:1.5px solid transparent;position:relative}
  .seat.av{background:var(--green-bg);color:var(--green)}.seat.av:hover{transform:scale(1.1)}
  .seat.tk{background:#efe7dd;color:var(--muted)}
  .seat.me{background:var(--maroon);color:#fff;border-color:var(--gold)}
  .seat.broke{background:var(--red-bg);color:var(--red);cursor:not-allowed}
  .seat.pwd{background:var(--purple-bg);color:var(--purple);border:1.5px dashed var(--purple)}
  .seat .star{position:absolute;top:-4px;right:-4px;font-size:8px}
  .legend{display:flex;gap:11px;flex-wrap:wrap;margin-top:13px;font-size:10px;color:var(--muted)}
  .legend i{width:11px;height:11px;border-radius:4px;display:inline-block;margin-right:5px;vertical-align:-1px}
  .pwdbox{background:var(--purple-bg);border:1px solid #ddcdee;border-radius:13px;padding:12px;margin-top:13px}
  .pwdbox b{font-size:12.5px;color:var(--purple);display:block;margin-bottom:7px}

  .chat{display:flex;gap:10px;align-items:center;padding:11px;border:1px solid var(--line);border-radius:15px;background:var(--card);margin-bottom:9px}
  .chat .cav{width:40px;height:40px;border-radius:12px;background:linear-gradient(150deg,var(--blue),#22426b);color:#fff;display:grid;place-items:center;font-weight:700;font-size:14px;flex-shrink:0}
  .chat .cb{flex:1;min-width:0}
  .chat .cb b{font-size:13px;font-weight:600;display:flex;justify-content:space-between}
  .chat .cb b span{font-size:10px;color:var(--muted);font-weight:500}
  .chat .cb p{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
  .unread{background:var(--maroon);color:#fff;font-size:10px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;display:grid;place-items:center;font-weight:700}

  .verify{text-align:center;padding:30px 10px}
  .verify .vic{width:64px;height:64px;border-radius:20px;background:var(--blue-bg);color:var(--blue);display:grid;place-items:center;font-size:30px;margin:0 auto 16px}
  .verify h3{font-family:'Fraunces',serif;font-size:20px;margin-bottom:8px}
  .verify p{font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:18px}
  .codeboxes{display:flex;gap:8px;justify-content:center;margin-bottom:18px}
  .codeboxes div{width:38px;height:46px;border:1.5px solid var(--line);border-radius:11px;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:var(--maroon);background:#fff}
  .codeboxes div.fill{border-color:var(--maroon);background:#fff}

  .nav{position:absolute;bottom:0;left:0;right:0;background:rgba(255,253,250,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);display:flex;justify-content:space-around;padding:10px 4px 14px}
  .nav button{border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;font-size:9.5px;color:var(--muted);font-weight:600}
  .nav button.on{color:var(--maroon)}
  .nav .nio{font-size:18px}

  .info{padding:6px 4px}
  .info .label{font-size:12px;color:var(--maroon);font-weight:700;letter-spacing:.1em;text-transform:uppercase}
  .info h2{font-family:'Fraunces',serif;font-size:32px;font-weight:700;margin:10px 0 14px;line-height:1.12;letter-spacing:-.02em}
  .info .lead{font-size:15px;color:#5a4d44;line-height:1.65;max-width:520px}
  .feat{display:grid;gap:11px;margin-top:24px}
  .fitem{display:flex;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:15px;box-shadow:var(--shadow-sm)}
  .fitem .fic{width:42px;height:42px;border-radius:12px;background:linear-gradient(150deg,rgba(122,14,30,.1),rgba(230,181,74,.18));display:grid;place-items:center;font-size:19px;flex-shrink:0}
  .fitem b{font-size:14px;font-weight:600}
  .fitem p{font-size:12.5px;color:var(--muted);line-height:1.55;margin-top:3px}
  .scope{margin-top:20px;font-size:12px;color:var(--muted);background:#fff;border:1px dashed var(--line);border-radius:14px;padding:13px;line-height:1.6}
  .scope b{color:var(--maroon)}
  .newtag{display:inline-block;font-size:9px;background:var(--gold);color:var(--maroon-deep);font-weight:700;padding:2px 7px;border-radius:6px;margin-left:7px;vertical-align:1px;letter-spacing:.03em}

  .fade{animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="logo">L</div>
      <div><h1>LabDesk</h1><p>CCIS · PUP Manila · 5F South Wing</p></div>
    </div>
    <div class="tag"><span class="dot"></span> Live availability · 6 labs</div>
  </div>

  <div class="roles" id="roles">
    <button class="role active" data-role="admin"><span class="ri">🛡</span> Lab Admin</button>
    <button class="role" data-role="prof"><span class="ri">🎓</span> Professor</button>
    <button class="role" data-role="beadle"><span class="ri">📋</span> Beadle</button>
    <button class="role" data-role="student"><span class="ri">🎒</span> Student</button>
  </div>
  <div class="screentabs" id="screentabs"></div>

  <div class="stage">
    <div class="phone"><div class="screen" id="screen"><div class="notch"></div></div></div>
    <div class="info">
      <div class="label" id="infoLabel"></div>
      <h2 id="infoTitle"></h2>
      <p class="lead" id="infoLead"></p>
      <div class="feat" id="featList"></div>
      <div class="scope"><b>Scope:</b> Limited to the computer laboratories on the <b>5th Floor, South Wing, CCIS Building, PUP Manila</b>. Room data, schedules, and seat maps reflect this physical area only.</div>
    </div>
  </div>
</div>

<script>
/* ---------- SCREEN TEMPLATES ---------- */
const nav = (items,onIdx)=>`<div class="nav">${items.map((it,i)=>`<button class="${i===onIdx?'on':''}"><span class="nio">${it[0]}</span>${it[1]}</button>`).join('')}</div>`;

const SCREENS = {
  /* ============ ADMIN ============ */
  admin:{
    tabs:["Dashboard","Incoming request","Live floor"],
    render:[
      ()=>`
        <div class="appbar"><div class="hi">Good morning,</div>
          <div class="nm">Prof. R. Mendoza <div class="av">RM</div></div>
          <span class="rbadge">LABORATORY ADMINISTRATOR</span></div>
        <div class="body fade">
          <div class="stats">
            <div class="stat g"><div class="n">3</div><div class="l">Available now</div></div>
            <div class="stat r"><div class="n">2</div><div class="l">Occupied</div></div>
            <div class="stat a"><div class="n">4</div><div class="l">Pending requests</div></div>
            <div class="stat b"><div class="n">1</div><div class="l">Awaiting check-in</div></div>
          </div>
          <div class="sec-h">Auto-release watch <a>Settings</a></div>
          <div class="card" style="background:linear-gradient(150deg,var(--amber-bg),#fff);border-color:#eed9ab">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <div><b style="font-size:13.5px">Lab 502 · BSCS 1-2</b>
              <div style="font-size:11.5px;color:var(--amber);font-weight:600;margin-top:3px">⏱ No check-in — auto-release in 04:12</div></div>
              <button class="btn ok" style="flex:none;padding:8px 12px">Hold</button>
            </div>
          </div>
          <div class="sec-h">Pending requests <a>View all (4)</a></div>
          <div class="req">
            <div class="rh"><b>Lab 503 · May 29</b><span>6:00 PM</span></div>
            <div class="meta"><b>Mr. Reni Montañ</b> · BSIT 2-4 · OM<br>Purpose: <b>Class (F2F)</b> · 40 students</div>
            <span class="stamp">🕑 Form submitted May 26, 2:55 PM</span>
            <div class="acts"><button class="btn ok">Approve</button><button class="btn no">Reject</button></div>
          </div>
          <div class="req">
            <div class="rh"><b>Lab 506 · May 30</b><span>1:00 PM</span></div>
            <div class="meta"><b>Beadle J. Cruz</b> for Prof. Santos · BSIT 3-2<br>Purpose: <b>Class Activity</b> · needs Projector</div>
            <span class="stamp">🕑 Form submitted May 27, 9:10 AM</span>
            <div class="acts"><button class="btn ok">Approve</button><button class="btn no">Reject</button></div>
          </div>
        </div>${nav([["▦","Dashboard"],["🗓","Schedule"],["📥","Requests"],["⚙","Rooms"]],0)}`,
      ()=>`
        <div class="appbar compact"><div class="backrow"><div class="bk" data-go="0">‹</div>
          <div><div class="ti">Request detail</div><div class="sub">Mirrors the LOO paper form</div></div></div></div>
        <div class="body fade">
          <div class="card">
            <div style="font-size:11px;color:var(--muted);font-weight:700;letter-spacing:.05em;text-transform:uppercase">Submitted</div>
            <div style="font-size:13px;margin-top:3px"><b>May 26, 2026 · 2:55 PM</b> &nbsp;→&nbsp; for use <b>May 29, 6:00 PM</b></div>
            <div style="font-size:11.5px;color:var(--amber);margin-top:6px;font-weight:600">⚠ 3-working-day rule: met</div>
          </div>
          <div class="sec-h">Faculty &amp; class</div>

/* ---------- HELPERS ---------- */
function roomRow(state,no,line1,line2,prof,cls,pcs){
  const lbl=state==='free'?'OPEN':state==='occ'?'OCCUPIED':'PENDING';
  const tip=state!=='free'?`<div class="tip"><b>${cls}</b><br>${prof!=='—'?prof+'<br>':''}${line2}</div>`:'';
  return `<div class="room">${tip}<div class="rno ${state}">${no}</div>
    <div class="rm"><b>Lab ${no}</b><span>${line1} · ${line2}</span>${pcs?`<div class="comp"><span class="ci"></span>${pcs}</div>`:''}</div>
    <span class="pill ${state}">${lbl}</span></div>`;
}
function schedRow(time,no,block,prof,subj){
  return `<div class="room"><div class="tip"><b>${subj}</b><br>${prof}<br>${time}</div>
    <div class="rno occ" style="width:auto;padding:0 10px;font-size:11px">${time.split('–')[0]}</div>
    <div class="rm"><b>Lab ${no} · ${block}</b><span>${time}</span></div>
    <span class="pill occ">BUSY</span></div>`;
}
function floorPlan(mode){
  // seat states: av tk me broke pwd
  const seats=[
    ['pwd','A1'],['pwd','A2'],['av','A3'],['av','A4'],['tk','A5'],['broke','A6'],
    ['av','B1'],['me','B2'],['av','B3'],['tk','B4'],['av','B5'],['av','B6'],
    ['av','C1'],['av','C2'],['tk','C3'],['av','C4'],['av','C5'],['av','C6'],
    ['tk','D1'],['av','D2'],['av','D3'],['av','D4'],['broke','D5'],['av','D6']
  ];
  const taken={A5:'L. Pascual',B4:'M. Reyes',C3:'K. Tan',D1:'R. Dela Cruz',B2:'Mara L. (you)'};
  const cells=seats.map(([st,id])=>{
    const star=st==='pwd'?'<span class="star">♿</span>':'';
    return `<div class="seat ${st}" data-id="${id}" data-who="${taken[id]||''}">${id}${star}</div>`;
  }).join('');
  return `<div class="floor"><div class="floorwrap">
    <div class="board">⌨ PROFESSOR / FRONT ⌨</div>
    <div class="door" style="top:26px;left:-1px;border-left:none;border-radius:0 5px 5px 0">▣ MAIN IN</div>
    <div class="door exit" style="bottom:10px;right:-1px;border-right:none;border-radius:5px 0 0 5px">EXIT ▶</div>
    <div class="grid">${cells}</div>
  </div>
  <div class="legend">
    <span><i style="background:var(--maroon)"></i>You</span>
    <span><i style="background:var(--green-bg)"></i>Free</span>
    <span><i style="background:#efe7dd"></i>Taken</span>
    <span><i style="background:var(--purple-bg)"></i>♿ Priority</span>
    <span><i style="background:var(--red-bg)"></i>Broken</span>
  </div></div>`;
}

/* ---------- STATE + WIRING ---------- */
let role='admin',scr=0;
const screen=document.getElementById('screen');
const tabsEl=document.getElementById('screentabs');

function paintInfo(){
  const d=INFO[role];
  document.getElementById('infoLabel').textContent=d.label;
  document.getElementById('infoTitle').textContent=d.title;
  document.getElementById('infoLead').textContent=d.lead;
  document.getElementById('featList').innerHTML=d.feats.map(f=>
    `<div class="fitem"><div class="fic">${f[0]}</div><div><b>${f[1]}${f[3]?'<span class="newtag">NEW</span>':''}</b><p>${f[2]}</p></div></div>`).join('');
}
function paintTabs(){
  tabsEl.innerHTML=SCREENS[role].tabs.map((t,i)=>`<button class="stab ${i===scr?'on':''}" data-tab="${i}">${t}</button>`).join('');
}
function render(){
  paintTabs();
  const html=SCREENS[role].render[scr]();
  screen.innerHTML=`<div class="notch"></div>`+html;
}
function go(i){scr=i;render();}

document.querySelectorAll('.role').forEach(r=>r.addEventListener('click',()=>{
  role=r.dataset.role;scr=0;
  document.querySelectorAll('.role').forEach(x=>x.classList.toggle('active',x===r));
  paintInfo();render();
}));
tabsEl.addEventListener('click',e=>{const t=e.target.closest('[data-tab]');if(t)go(+t.dataset.tab);});

screen.addEventListener('click',e=>{
  const goEl=e.target.closest('[data-go]');
  if(goEl){go(+goEl.dataset.go);return;}
  const seat=e.target.closest('.seat');
  if(seat){
    if(role==='student'&&(seat.classList.contains('av')||seat.classList.contains('pwd'))){
      screen.querySelectorAll('.seat.me').forEach(s=>{s.classList.remove('me');s.classList.add('av');});
      seat.classList.remove('av','pwd');seat.classList.add('me');
      const id=seat.getAttribute('data-id');
      const btn=document.getElementById('studentConfirm');if(btn)btn.textContent='Confirm seat '+id;
    }
    if(role==='prof'){
      const who=seat.getAttribute('data-who');const id=seat.getAttribute('data-id');
      const box=document.getElementById('profSeatInfo');
      if(box)box.innerHTML=who?`<b style="color:var(--ink);font-size:13px">${id}</b> — ${who}`:`<b style="color:var(--ink);font-size:13px">${id}</b> — empty`;
    }
  }
});

paintInfo();render();
